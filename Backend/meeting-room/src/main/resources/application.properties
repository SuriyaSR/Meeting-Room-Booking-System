spring.application.name=meeting-room

spring.datasource.url=${POSTGRES_MEETING_DB_URI}
spring.datasource.username=${POSTGRES_MEETING_DB_USERNAME}
spring.datasource.password=${POSTGRES_MEETING_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC